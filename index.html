<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { font-family: 'Manrope', system-ui, sans-serif; color: var(--ink); }

  html { scroll-behavior: smooth; }

  .mobile-menu-toggle { display: none; }

  /* Responsive overrides are intentionally scoped below desktop widths. */
  @media (max-width: 1024px) {
    *, *::before, *::after { box-sizing: border-box; }

    .site-nav,
    .hero-section,
    .demo-section,
    .content-section,
    .final-cta-section,
    .site-footer {
      padding-left: 32px !important;
      padding-right: 32px !important;
    }

    .site-nav { gap: 18px !important; align-items: flex-start !important; }
    .site-nav-links { gap: 14px !important; flex-wrap: wrap !important; justify-content: flex-end !important; }
    .hero-copy-grid,
    .final-cta-grid,
    .mod-row,
    .faq-row {
      grid-template-columns: 1fr !important;
    }
    .hero-copy-grid { gap: 34px !important; }
    .final-cta-grid { gap: 28px !important; }
    .stats-grid,
    .buyer-grid,
    .testimonial-grid {
      grid-template-columns: 1fr !important;
    }
    .mod-row,
    .faq-row {
      gap: 12px !important;
      align-items: start !important;
    }
    .section-title { max-width: none !important; }
  }

  @media (max-width: 720px) {
    html, body { overflow-x: hidden; }
    .site-nav,
    .hero-section,
    .demo-section,
    .content-section,
    .final-cta-section,
    .site-footer {
      padding-left: 18px !important;
      padding-right: 18px !important;
    }

    .site-nav {
      flex-direction: row !important;
      align-items: center !important;
      justify-content: space-between !important;
      padding-top: 18px !important;
      padding-bottom: 14px !important;
    }
    .mobile-menu-toggle {
      display: inline-flex !important;
      width: 42px;
      height: 42px;
      margin-left: auto;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(253,249,237,0.86);
      color: var(--ink);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }
    .mobile-menu-toggle span {
      display: block;
      width: 18px;
      height: 2px;
      background: currentColor;
      border-radius: 999px;
      transition: transform .2s ease, opacity .2s ease;
    }
    .mobile-menu-toggle.is-open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .mobile-menu-toggle.is-open span:nth-child(2) { opacity: 0; }
    .mobile-menu-toggle.is-open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .site-nav-links {
      display: none !important;
      position: absolute !important;
      right: 18px !important;
      top: calc(100% - 4px) !important;
      width: min(248px, calc(100vw - 36px)) !important;
      padding: 10px !important;
      border: 1px solid var(--line) !important;
      border-radius: 8px !important;
      background: rgba(253,249,237,0.98) !important;
      box-shadow: 0 18px 36px -24px rgba(0,0,0,0.35) !important;
      grid-template-columns: 1fr !important;
      gap: 8px !important;
      font-size: 13px !important;
      z-index: 10 !important;

    .site-nav-links.is-open {

    .site-nav-link,

    .hero-cta-row {

    .hero-proof-row {

    .demo-section { padding-top: 64px !important; }
    .ai-demo-card {

    .demo-header {

    .demo-answer-title {

    }
    .demo-note {
      text-align: left !important;
      line-height: 1.45 !important;
    }

    .content-section {
      padding-top: 64px !important;
      padding-bottom: 64px !important;

    .section-body { margin-top: 30px !important; }
    .section-title {

    }
    .section-kicker {

      line-height: 1.58 !important;
    }
    .stats-grid,
    .buyer-grid,
    .testimonial-grid {

    }
    .stat-card,

    .stat-number { font-size: 48px !important; }
    .buyer-icon {

    .quote-strip {

      padding: 20px !important;

    .quote-strip > div:last-child { white-space: normal !important; }
    .modules-list { border-radius: 6px !important; }
    .mod-row { padding: 20px !important; }
    .mod-n { font-size: 36px !important; }
    .kit-tags { gap: 8px !important; }
    .testimonial-card { min-height: 0 !important; }
    .faq-row { padding: 20px 0 !important; }

    .final-cta-section {

    .final-cta-title {
      font-size: 44px !important;
      line-height: 1 !important;
    }
    .final-cta-grid p { font-size: 15px !important; }
    .site-footer-inner {
      align-items: flex-start !important;
      flex-direction: column !important;
    }
  }

  @media (max-width: 420px) {
    .hero-heading { font-size: 39px !important; }
    .hero-media-frame { height: 390px !important; }
    .hero-mockup-wrap {
      right: 8px !important;

    }
    .section-title { font-size: 32px !important; }
    .final-cta-title { font-size: 40px !important; }
  }
</style>
